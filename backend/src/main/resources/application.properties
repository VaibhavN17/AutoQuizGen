# Set application port to 8080 (React runs on 5173 usually)
server.port=8082
# Database Configuration (PostgreSQL)
# Adjust dbname, username, password as needed based on user's exact postgres setup.
# Autoquizgen default user / db
spring.datasource.url=jdbc:postgresql://localhost:5432/autoquizgen
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Limits (bumped to 5MB from default 1MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Local LLaMA API Endpoint Config
llama.api.url=http://127.0.0.1:8081/v1/chat/completions
